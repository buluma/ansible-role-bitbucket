---
- name: Verify
  hosts: all
  become: true
  gather_facts: true
  remote_user: root
  tasks:
    - name: Check bitbucket is up
      block:
        - name: Check port
          ansible.builtin.wait_for:
            delay: 10
            port: 7990
            timeout: 600
        - name: Check page
          ansible.builtin.uri:
            return_content: true
            status_code: 200
            timeout: 30
            url: http://localhost:7990
          register: result
          when: ansible_facts['os_family'] == 'Debian'
        - name: Check result
          ansible.builtin.fail:
            msg: "'bitbucket' not found in the response body"
          when:
            - ansible_facts['os_family'] == 'Debian'
            - "'bitbucket' not in result.content"
      rescue:
        - name: Diagnostics | systemctl status bitbucket.service
          ansible.builtin.command: systemctl status bitbucket.service --no-pager -l
          changed_when: false
          failed_when: false
          register: _diag_status

        - name: Diagnostics | print systemctl status
          ansible.builtin.debug:
            var: _diag_status.stdout_lines

        - name: Diagnostics | tail launcher.log
          ansible.builtin.shell: tail -n 200 /var/atlassian/application-data/bitbucket/log/launcher.log 2>&1
          changed_when: false
          failed_when: false
          register: _diag_launcher

        - name: Diagnostics | print launcher.log
          ansible.builtin.debug:
            var: _diag_launcher.stdout_lines

        - name: Diagnostics | tail atlassian-bitbucket.log
          ansible.builtin.shell: tail -n 200 /var/atlassian/application-data/bitbucket/log/atlassian-bitbucket.log 2>&1
          changed_when: false
          failed_when: false
          register: _diag_applog

        - name: Diagnostics | print atlassian-bitbucket.log
          ansible.builtin.debug:
            var: _diag_applog.stdout_lines

        - name: Re-raise failure
          ansible.builtin.fail:
            msg: Bitbucket verify failed -- see diagnostics above
