---
# Pins the CI platform/version matrix for this role. Without this, ansible-generator
# falls back to default_platforms and silently discards these choices on regenerate.
platforms:
  - name: EL
    versions:
      - "10"
      - "9"
  - name: Debian
    versions:
      # Excludes 11/12 (this atlassian-bitbucket package requires Java 21,
      # unavailable in either release's main repo without backports) --
      # done as a manual override in .github/workflows/molecule.yml
      # instead, since generating a Debian versions list containing only
      # "13" trips a bug in ansible-generator ("object of type 'dict' has
      # no attribute '13'"). Regenerating this role will silently
      # reintroduce debian11/12; reapply the override if that happens.
      - all
  - name: Fedora
    versions:
      # Excludes 45: it ships Python 3.15.0b3, whose dataclasses module
      # dropped _is_type, breaking ansible-core's AnsiballZ module wrapper.
      - "44"
      - "43"
  - name: Ubuntu
    versions:
      - all
